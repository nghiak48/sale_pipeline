services:
  airflow-init:
    image: apache/airflow:2.7.1-python3.10
    command: >
      bash -c "airflow db init &&
      airflow users create
      --username $AIRFLOW_ADMIN_USER
      --password $AIRFLOW_ADMIN_PASSWORD
      --firstname Admin
      --lastname User
      --role Admin
      --email $AIRFLOW_ADMIN_EMAIL"
    environment: &airflow_env
      AIRFLOW__WEBSERVER__SECRET_KEY: $AIRFLOW__WEBSERVER__SECRET_KEY
      _PIP_ADDITIONAL_REQUIREMENTS: "kafka-python pyarrow pandas duckdb sqlalchemy psycopg2-binary mlxtend"
      AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin@postgres:5432/retail_db
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "5"
      AIRFLOW__CORE__MIN_SERIALIZED_DAG_UPDATE_INTERVAL: "5"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__HOSTNAME_CALLABLE: "socket:gethostname"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"                    # chỉ chạy 1 lần, không restart

  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_webserver
    hostname: airflow-webserver      # Fix hostname cố định
    command: webserver
    ports:
      - "8081:8080"
    environment:
      <<: *airflow_env
    mem_limit: 1g
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sale_pipeline:/opt/airflow/sale_pipeline
      - airflow_logs:/opt/airflow/logs
      - ./data_lake:/opt/airflow/data_lake
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully  # chờ init xong mới start
    restart: always

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_scheduler
    hostname: airflow-scheduler      # Fix hostname cố định
    command: scheduler
    environment:
      <<: *airflow_env
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"     # tối đa 2 task/DAG
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "2"      # tối đa 2 run/DAG
      AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY: "8"
    mem_limit: 2g
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sale_pipeline:/opt/airflow/sale_pipeline
      - airflow_logs:/opt/airflow/logs                 # Share logs
      - ./data_lake:/opt/airflow/data_lake
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully  # chờ init xong mới start
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: retail_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: retail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schemas.sql:/docker-entrypoint-initdb.d/init_schemas.sql
      - ./sql/ml_gold_tables.sql:/docker-entrypoint-initdb.d/ml_gold_tables.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=$GF_SECURITY_ADMIN_USER
      - GF_SECURITY_ADMIN_PASSWORD=$GF_SECURITY_ADMIN_PASSWORD
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/sales_operations.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - postgres

  metabase:
    image: metabase/metabase:v0.48.0
    container_name: metabase
    ports:
      - "3001:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=retail_db
      - MB_DB_PORT=5432
      - MB_DB_USER=postgres
      - MB_DB_PASS=admin
      - MB_DB_HOST=postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
  airflow_logs:
  grafana_data:
  minio_data: